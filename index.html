<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!-- FIX: prevent pinch-zoom and iOS double-tap zoom -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<!-- FIX: iOS full-screen / status bar -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<title>You Found Me 💌</title>
		<link rel="stylesheet" href="style.css?v=6" />

		<!-- Pixel font -->
		<link
			href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
			rel="stylesheet"
		/>
		<!-- Letter font -->
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap"
			rel="stylesheet"
		/>

		<!-- Mobile joystick — must load before game.js -->
		<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>
	</head>
	<body>
		<div id="game-container">
			<canvas id="gameCanvas"></canvas>
			<canvas id="fogCanvas"></canvas>

			<!--
				FIX: joystick-zone is its OWN element, layered BELOW ui-overlay (z-index 5 vs 10).
				This means when ui-overlay gets pointer-events:all for the letter/envelope,
				it won't swallow the joystick — and when the overlay is pointer-events:none
				during exploration, the joystick-zone (always pointer-events:all) still works.
			-->
			<div id="joystick-zone"></div>

			<div id="ui-overlay"></div>
		</div>
		<script src="game.js?v=6"></script>
	</body>
</html>
